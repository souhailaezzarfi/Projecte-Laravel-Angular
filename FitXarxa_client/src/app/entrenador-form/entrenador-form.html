<div class="p-6 mt-16 bg-gray-950 min-h-screen flex justify-center items-start">
    <div class="bg-[#1B2340] rounded-xl p-8 w-full max-w-lg shadow-lg">

        <h1 class="text-2xl font-bold text-white mb-6">
            {{ esEdicio ? 'Editar Entrenador' : 'Nou Entrenador' }}
        </h1>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="mb-4">
                <label class="text-white block mb-1">Nom</label>
                <input formControlName="nom" type="text"
                    class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-white/20 focus:outline-none focus:border-[#FF5003]">
                @if (form.get('nom')?.invalid && form.get('nom')?.touched) {
                <p class="text-red-400 text-sm mt-1">El nom és obligatori</p>
                }
            </div>

            <div class="mb-4">
                <label class="text-white block mb-1">Cognoms</label>
                <input formControlName="cognoms" type="text"
                    class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-white/20 focus:outline-none focus:border-[#FF5003]">
                @if (form.get('cognoms')?.invalid && form.get('cognoms')?.touched) {
                <p class="text-red-400 text-sm mt-1">Els cognoms són obligatoris</p>
                }
            </div>

            <div class="mb-6">
                <label class="text-white block mb-1">Imatge</label>
                <input type="file" accept="image/*" (change)="onFileChange($event)"
                    class="w-full text-white bg-gray-800 rounded-lg px-4 py-2 border border-white/20">
            </div>

            <div class="flex gap-3">
                <button type="submit"
                    class="px-6 py-2 rounded-lg text-white font-bold bg-[#FF5003] hover:bg-[#e64800] transition">
                    {{ esEdicio ? 'Guardar' : 'Crear' }}
                </button>
                <button type="button" (click)="router.navigate(['/entrenador-list'])"
                    class="px-6 py-2 rounded-lg text-white font-bold bg-gray-600 hover:bg-gray-500 transition">
                    Cancel·lar
                </button>
            </div>

        </form>
    </div>
</div>
