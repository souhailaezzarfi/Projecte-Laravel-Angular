<div class="p-6 mt-16 bg-gray-950 min-h-screen">
  <h1 class="text-3xl font-bold text-white mb-6">Llistat d'Entrenadors</h1>

  <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4">

    <button [routerLink]="['/entrenador-form']"
      class="px-5 py-2 rounded-lg text-white font-bold bg-[#FF5003] hover:bg-[#e64800] transition">
      + Nou Entrenador
    </button>

    <input [(ngModel)]="cercaText" type="text" placeholder="Cercar per nom o cognoms..." class="w-full md:w-1/4 px-4 py-2 rounded-lg bg-[#1B2340] text-white border border-white/20 
             focus:outline-none focus:border-[#FF4E45]">
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    @for (entrenador of entrenadors | filtreEntrenador:cercaText; track entrenador.id) {

    <div class="rounded-xl overflow-hidden shadow-lg bg-[#1B2340] border border-white/10 
                hover:scale-[1.02] hover:shadow-xl transition">

      <!-- Imagen -->
      <div class="relative">
        <img [src]="entrenador.imatge ?? 'default-user.jpg'" [alt]="entrenador.nom"
          class="w-full h-56 object-contain bg-gray-800">

        <!-- Badge "Entrenador" -->
        <span class="absolute bottom-3 right-3 bg-[#FF5003] text-white text-sm px-3 py-1 rounded-full shadow">
          Entrenador
        </span>
      </div>

      <div class="p-5 text-white">

        <h5 class="text-xl font-bold mb-2">
          {{ entrenador.nom }} {{ entrenador.cognoms }}
        </h5>

        <div class="flex gap-3">
          <button [routerLink]="['/entrenador-form', entrenador.id]"
            class="px-4 py-2 rounded-lg text-white font-medium bg-[#FF5003] hover:bg-[#e64800] transition">
            Editar
          </button>
          <button (click)="deleteEntrenador(entrenador.id)"
            class="px-4 py-2 rounded-lg text-white font-medium bg-gray-600 hover:bg-gray-500 transition">
            Eliminar
          </button>
        </div>

      </div>

    </div>

    }

  </div>
</div>
